# /etc/nginx/sites-available/orderapi.investalo.de
# Reverse Proxy für Investalo Autotrader Signal Gateway
# Aktivieren:
#   ln -s /etc/nginx/sites-available/orderapi.investalo.de /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# TLS via certbot:
#   certbot --nginx -d orderapi.investalo.de

# ---------- HTTP -> HTTPS Redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name orderapi.investalo.de;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS Reverse Proxy ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name orderapi.investalo.de;

    # Zertifikate (von certbot eingetragen / anpassen)
    ssl_certificate     /etc/letsencrypt/live/orderapi.investalo.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orderapi.investalo.de/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Header
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header Referrer-Policy           "no-referrer" always;

    # MT5 pollt klein, Webhook ist klein -> 1MB reicht
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Logs (separat fürs Auditing)
    access_log /var/log/nginx/orderapi.access.log;
    error_log  /var/log/nginx/orderapi.error.log warn;

    # ---------- Proxy auf FastAPI Container ----------
    location / {
        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Polling-freundlich: kurze Connect-, längere Read-Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_buffering off;
    }

    # Healthcheck ohne Logspam
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:3005/health;
    }
}
